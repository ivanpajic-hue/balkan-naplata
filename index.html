<!DOCTYPE html>
<html lang="sr-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balkan AVTO — Naplata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" defer></script>
<style>
:root{
  --ink:#16181d; --ink-2:#1d2027; --ink-3:#262a33;
  --paper:#f4f6f8; --surface:#ffffff;
  --brand:#c81e2b; --brand-700:#9b1620; --brand-50:#fdecec;
  --ok:#0c8a6a; --ok-50:#e6f5f0;
  --warn:#c8761e; --warn-50:#fbf0e2;
  --info:#2563eb; --info-50:#e8effc;
  --line:#e6e8ec; --line-2:#eef0f3;
  --txt:#1b1e24; --muted:#6b7280; --muted-2:#9aa1ad;
  --shadow:0 1px 2px rgba(16,18,24,.04), 0 6px 20px rgba(16,18,24,.06);
  --shadow-lg:0 12px 40px rgba(16,18,24,.18);
  --r:14px; --r-sm:9px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --disp:"Archivo",var(--sans);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--txt);background:var(--paper);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfd4db;border-radius:8px;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:#b6bcc6}

/* top route accent */
.routeline{position:fixed;top:0;left:0;right:0;height:3px;z-index:60;
  background:linear-gradient(90deg,var(--brand) 0%,var(--brand-700) 40%,var(--ink) 100%)}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(1200px 500px at 110% -10%, rgba(200,30,43,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 120%, rgba(22,24,29,.06), transparent 55%),
    var(--paper);}
#login.on{display:flex}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.login-head{padding:30px 30px 22px;border-bottom:1px solid var(--line-2);
  background:linear-gradient(180deg,#fff, #fbfbfc)}
.login-card form{padding:24px 30px 30px}
.brandmark{display:flex;align-items:center;gap:11px}
.brandmark .glyph{width:38px;height:38px;border-radius:10px;background:var(--brand);
  display:grid;place-items:center;color:#fff;box-shadow:0 4px 12px rgba(200,30,43,.32)}
.brandmark .glyph svg{width:22px;height:22px}
.brandmark .wm{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:.04em;line-height:1;color:var(--ink)}
.brandmark .wm small{display:block;font-family:var(--sans);font-weight:600;font-size:10.5px;
  letter-spacing:.16em;color:var(--brand);margin-top:3px}
.login-sub{margin-top:16px;color:var(--muted);font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--txt);margin-bottom:6px}
.field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);
  background:#fff;transition:border-color .15s, box-shadow .15s;outline:none}
.field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-50)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13.5px;
  padding:10px 16px;border-radius:var(--r-sm);transition:.15s;white-space:nowrap;border:1px solid transparent}
.btn svg{width:16px;height:16px}
.btn-pri{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(200,30,43,.25)}
.btn-pri:hover{background:var(--brand-700)}
.btn-block{width:100%}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--txt)}
.btn-ghost:hover{background:var(--paper);border-color:#d6dae0}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:#000}
.btn-sm{padding:7px 11px;font-size:12.5px}
.btn-icon{padding:8px;border-radius:8px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.login-err{display:none;background:var(--brand-50);color:var(--brand-700);border:1px solid #f6d5d5;
  padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px}
.login-err.on{display:block}
.login-hint{margin-top:16px;font-size:12px;color:var(--muted-2);text-align:center}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;grid-template-columns:248px 1fr}
#app.on{display:grid}
.side{background:var(--ink);color:#cdd2db;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:20px 18px 14px}
.side .brandmark .wm{color:#fff}
.side .brandmark .glyph{box-shadow:none}
.side-period{margin:14px 0 4px;padding:10px 12px;background:var(--ink-2);border:1px solid #2c303a;
  border-radius:10px}
.side-period .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
.side-period .val{font-family:var(--disp);font-weight:700;font-size:14px;color:#fff;margin-top:2px}
.nav{padding:10px 12px;flex:1;overflow-y:auto}
.nav .grp{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#646b78;
  padding:14px 12px 7px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#aeb4bf;
  font-weight:500;font-size:13.5px;position:relative;transition:.12s;cursor:pointer}
.nav a svg{width:18px;height:18px;opacity:.85;flex:none}
.nav a:hover{background:var(--ink-2);color:#fff}
.nav a.active{background:var(--ink-3);color:#fff}
.nav a.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--brand)}
.nav a .badge{margin-left:auto;background:var(--ink-3);color:#c7ccd5;font-size:11px;font-weight:600;
  padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}
.nav a.active .badge{background:var(--brand);color:#fff}
.side-foot{padding:12px;border-top:1px solid #262a33}
.userbox{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px}
.avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-700));
  color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
.userbox .meta{min-width:0;flex:1}
.userbox .nm{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.userbox .rl{font-size:11px;color:var(--muted-2);text-transform:capitalize}
.cloud{display:flex;align-items:center;gap:7px;margin-top:8px;padding:7px 10px;border-radius:9px;
  background:var(--ink-2);font-size:11.5px;color:#aeb4bf}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.green{background:#22c08a;box-shadow:0 0 0 3px rgba(34,192,138,.18)}
.dot.gray{background:#6b7280}
.dot.amber{background:var(--warn)}
.dot.red{background:var(--brand)}

/* ---------- MAIN ---------- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(244,246,248,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:16px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar h1{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.01em;color:var(--ink)}
.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
.topbar .spacer{flex:1}
.topbar .actions{display:flex;gap:8px;align-items:center}
.view{padding:22px 26px 60px;max-width:1320px;width:100%}
.menutoggle{display:none}

/* filters */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.search{position:relative;flex:1;min-width:200px;max-width:340px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-2)}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none}
.search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-50)}
select.sel,input.inp{padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;color:var(--txt)}
select.sel:focus,input.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-50)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.kpi .val{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:-.01em;margin-top:9px;color:var(--ink)}
.kpi .val.eur::after{content:"";}
.kpi .meta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px}
.kpi .ic{position:absolute;right:14px;top:14px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
.kpi .ic svg{width:16px;height:16px}
.kpi.red .ic{background:var(--brand-50);color:var(--brand)}
.kpi.ok .ic{background:var(--ok-50);color:var(--ok)}
.kpi.warn .ic{background:var(--warn-50);color:var(--warn)}
.kpi.info .ic{background:var(--info-50);color:var(--info)}
.kpi.ink .ic{background:#eef0f3;color:var(--ink)}
.kpi .accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.kpi.red .accent{background:var(--brand)} .kpi.ok .accent{background:var(--ok)}
.kpi.warn .accent{background:var(--warn)} .kpi.info .accent{background:var(--info)} .kpi.ink .accent{background:var(--ink)}

/* panels & grid */
.grid{display:grid;gap:16px}
.g-2{grid-template-columns:1.4fr 1fr}
.g-2e{grid-template-columns:1fr 1fr}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:10px;padding:14px 17px;border-bottom:1px solid var(--line-2)}
.panel-h h3{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--ink);letter-spacing:-.005em}
.panel-h .hint{font-size:12px;color:var(--muted)}
.panel-h .spacer{flex:1}
.panel-b{padding:16px 17px}
.panel-b.flush{padding:0}

/* tables */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl thead th{position:sticky;top:0;background:#fbfbfc;text-align:left;font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;z-index:1}
table.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
table.tbl thead th.sortable:hover{background:#f1f1f4;color:var(--ink)}
.sortarr{color:var(--brand);font-size:10px;margin-left:2px}
table.tbl tbody tr:last-child td{border-bottom:none}
table.tbl tbody tr{transition:background .1s}
table.tbl tbody tr:hover{background:#fafbfc}
table.tbl tbody tr.clk{cursor:pointer}
table.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
table.tbl .strong{font-weight:600;color:var(--ink)}
.t-empty{padding:40px 20px;text-align:center;color:var(--muted)}
.t-empty svg{width:34px;height:34px;color:var(--muted-2);margin-bottom:10px}
.cellmeta{font-size:11.5px;color:var(--muted-2)}
.tag-firma{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap}
.tag-eur{background:var(--ok-50);color:var(--ok)} .tag-din{background:var(--info-50);color:var(--info)}
.tag-kes{background:var(--warn-50);color:var(--warn)} .tag-mix{background:#efe9fb;color:#6d3bdb}

/* status chips */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip .dot{width:6px;height:6px}
.chip.open{background:var(--brand-50);color:var(--brand-700)}
.chip.part{background:var(--info-50);color:var(--info)}
.chip.paid{background:var(--ok-50);color:var(--ok)}
.chip.over{background:#fbe3e3;color:#a31621}
/* kategorija — filter chip-ovi i inline oznaka */
.katflt{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.katflt .kl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:2px}
.katchip{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--muted);transition:.12s}
.katchip:hover{border-color:#d6dae0;color:var(--txt)}
.katchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.kattag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;background:var(--line-2);color:var(--muted);text-transform:uppercase;letter-spacing:.03em;vertical-align:middle}

/* collection bar — signature */
.colbar{display:flex;flex-direction:column;gap:4px;min-width:130px}
.colbar .track{height:9px;border-radius:6px;background:#f0f2f5;overflow:hidden;display:flex;border:1px solid var(--line-2)}
.colbar .paid{height:100%;background:linear-gradient(90deg,var(--ok),#13a07e)}
.colbar .owed{height:100%;background:
  repeating-linear-gradient(45deg, #f7d7d9, #f7d7d9 4px, #fbe7e8 4px, #fbe7e8 8px)}
.colbar .lab{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted)}
.colbar .lab b{color:var(--ink);font-weight:600}

/* progress mini */
.prog{height:7px;border-radius:5px;background:#eef0f3;overflow:hidden}
.prog > i{display:block;height:100%;border-radius:5px}

/* badges/pills */
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);
  border-radius:20px;padding:4px 11px;font-size:12px;color:var(--txt)}
.muted{color:var(--muted)}

/* charts */
.chart-box{position:relative;height:280px}
.chart-sm{position:relative;height:240px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt)}
.legend .sw{width:11px;height:11px;border-radius:3px}

/* list rows */
.lrow{display:flex;align-items:center;gap:12px;padding:11px 17px;border-bottom:1px solid var(--line-2)}
.lrow:last-child{border-bottom:none}
.lrow .ttl{font-weight:600;color:var(--ink);font-size:13px}
.lrow .sb{font-size:11.5px;color:var(--muted)}
.lrow .amt{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.rank{width:24px;height:24px;border-radius:7px;background:var(--paper);border:1px solid var(--line);
  display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--muted);font-family:var(--disp)}
.rank.top{background:var(--brand);color:#fff;border-color:var(--brand)}

/* drawer */
#scrim{position:fixed;inset:0;background:rgba(16,18,24,.42);z-index:80;opacity:0;visibility:hidden;transition:.2s}
#scrim.on{opacity:1;visibility:visible}
#drawer{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:94vw;background:var(--paper);z-index:90;
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
#drawer.on{transform:translateX(0)}
.dr-h{background:var(--surface);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;align-items:flex-start;gap:14px}
.dr-h h2{font-family:var(--disp);font-weight:700;font-size:19px;color:var(--ink);letter-spacing:-.01em}
.dr-h .sb{font-size:12.5px;color:var(--muted);margin-top:3px}
.dr-b{flex:1;overflow-y:auto;padding:18px 22px}
.dr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dr-stat{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
.dr-stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.dr-stat .v{font-family:var(--disp);font-weight:700;font-size:18px;margin-top:5px}
.sec-t{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:18px 0 9px}

/* modal */
#modal-wrap{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(16,18,24,.42)}
#modal-wrap.on{display:flex}
.modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal.wide{max-width:860px}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:12px}
.modal-h h3{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--ink)}
.modal-h .spacer{flex:1}
.modal-b{padding:20px 22px;overflow-y:auto}
.modal-f{padding:14px 22px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end;background:#fbfbfc}
.x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.x:hover{background:var(--paper);color:var(--ink)}
.x svg{width:18px;height:18px}

/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--txt)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-50)}
.fg .hh{font-size:11px;color:var(--muted-2);margin-top:5px}

/* dropzone */
.drop{border:2px dashed #d2d7de;border-radius:var(--r);padding:40px 24px;text-align:center;background:#fff;transition:.15s;cursor:pointer}
.drop:hover,.drop.drag{border-color:var(--brand);background:var(--brand-50)}
.drop .di{width:48px;height:48px;border-radius:12px;background:var(--brand-50);color:var(--brand);display:grid;place-items:center;margin:0 auto 14px}
.drop .di svg{width:26px;height:26px}
.drop h3{font-family:var(--disp);font-weight:700;font-size:16px;color:var(--ink)}
.drop p{color:var(--muted);font-size:13px;margin-top:5px}

/* toast */
#toasts{position:fixed;right:20px;bottom:20px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:11px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;font-size:13px;max-width:380px;animation:slideup .25s ease}
.toast svg{width:18px;height:18px;flex:none}
.toast.ok{background:#0c8a6a} .toast.err{background:var(--brand-700)} .toast.warn{background:var(--warn)}
@keyframes slideup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* misc */
.row-actions{display:flex;gap:6px}
.iconbtn{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted);border:1px solid transparent}
.iconbtn:hover{background:var(--paper);color:var(--ink);border-color:var(--line)}
.iconbtn svg{width:16px;height:16px}
.iconbtn.danger:hover{background:var(--brand-50);color:var(--brand);border-color:#f3cccd}
.divline{height:1px;background:var(--line-2);margin:16px 0}
.fade{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.note svg{width:17px;height:17px;flex:none;margin-top:1px}

}

/* ============================================================
   BALKAN AVTO — NAPLATA  (single-file, offline-first + Google Sheets)
   ============================================================ */
"use strict";

/* ---- KONFIGURACIJA ---- */
const CFG = {
  // Zalepi Web App URL iz Apps Script-a (Deploy > Web app). Ostavi prazno za lokalni režim.
  WEB_APP_URL: "https://script.google.com/macros/s/AKfycbxrCRKdQJNe8gouVP5DMRkpAamnnnY66j06QrhSSCmpovjb-yD19O0eb9YadDQmESbI/exec",

  KURS_DEFAULT: 118,      // EUR -> RSD (info konverzija ino dela)
  ROK_DEFAULT: 30         // rok plaćanja u danima (za dospelost)
};
const cloudOn = () => CFG.WEB_APP_URL && !/PASTE_WEB_APP_URL/.test(CFG.WEB_APP_URL);

/* ---- IKONE ---- */
const I = {
  pregled:'<path d="M3 3h7v9H3zM14 3h7v5h-7zM14 12h7v9h-7zM3 16h7v5H3z"/>',

  izvestaji:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  podesavanja:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',

  inbox:'<polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',

  scale:'<path d="M12 3v18M5 7l-3 6h6zM19 7l-3 6h6zM3 21h18M7 7h10"/>',
  truck:'<rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',

  bell:'<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
  mail:'<path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  contact:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>'
};
const svg = (p,w) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w||2}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

/* ---- DOM helpers ---- */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---- FORMAT ---- */
const nf2 = new Intl.NumberFormat('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
const nf0 = new Intl.NumberFormat('de-DE',{maximumFractionDigits:0});
const eur = n => (nf2.format(+n||0))+' €';
const eur0= n => (nf0.format(Math.round(+n||0)))+' €';
const din = n => (nf0.format(Math.round(+n||0)))+' din';
const num = n => nf0.format(+n||0);
function fmtDate(d){ if(!d) return '—'; const x=(d instanceof Date)?d:new Date(d); if(isNaN(x))return esc(d);
  return String(x.getDate()).padStart(2,'0')+'.'+String(x.getMonth()+1).padStart(2,'0')+'.'+x.getFullYear()+'.'; }
const today = ()=> new Date().toISOString().slice(0,10);
function ymOf(d){ const x=new Date(d); return isNaN(x)?'' : x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'); }
function ymLabel(ym){ const [y,m]=ym.split('-'); const mn=['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec']; return mn[+m-1]+' '+y; }
const uid = (p)=> (p||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function daysBetween(a,b){ return Math.floor((new Date(b)-new Date(a))/86400000); }

/* stabilan ključ za dedup uvoza */
function chargeKey(c){
  return [c.tura,c.vozilo,c.nalogodavac,Math.round(c.iznos*100),c.utovar,c.istovar,(c.napomene||'').slice(0,24)]
    .join('|').toLowerCase().replace(/\s+/g,' ').trim();
}

/* ---- TOAST ---- */
function toast(msg,type){ const t=el('div','toast '+(type||''));
  const ic=type==='ok'?I.check:type==='err'?I.alert:type==='warn'?I.alert:I.cloud;
  t.innerHTML=svg(ic)+'<span>'+esc(msg)+'</span>'; $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),320)},3200); }

/* ---- KANAL / FIRMA ---- */
function kanalOf(c){ const ba=+c.balkanAvto||0, ino=+c.inoDeo||0, ke=+c.kes||0;
  if(ba>0 && ino>0) return 'MIX'; if(ino>0) return 'DIN'; if(ke>0) return 'KES'; if(ba>0) return 'EUR';
  return 'EUR'; }
function firmaOf(c){ const k=kanalOf(c); return k==='DIN'?'Balkan Transport (SRB)' : k==='KES'?'Gotovina' : 'Balkan Avto (SLO)'; }
const kanalTag = k => ({EUR:'<span class="tag-firma tag-eur">EUR</span>',DIN:'<span class="tag-firma tag-din">DIN</span>',KES:'<span class="tag-firma tag-kes">KEŠ</span>',MIX:'<span class="tag-firma tag-mix">EUR+DIN</span>'}[k]||'');
/* EUR-ekvivalent pojedinačnog zaduženja (za kanalsku raspodelu) */
function eurEq(c){ return (+c.balkanAvto||0) + (+c.inoDeo||0)/(state.settings.kurs||118) + (+c.kes||0); }

/* ============================================================
   STATE
   ============================================================ */
const state = {
  zaduzenja: [], uplate: [], korisnici: [], nalozi: [], opomene: [],
  session: null,
  settings: { kurs: CFG.KURS_DEFAULT, rok: CFG.ROK_DEFAULT },
  period: 'all',
  derived: null,
  view: 'pregled'
};

/* EUR-ekvivalent uplate (uplata može imati EUR fakturu, DIN fakturu i gotovinu) */
function payEur(u){
  if(u.eur!=null || u.din!=null || u.kes!=null)
    return round2((+u.eur||0) + (+u.din||0)/(state.settings.kurs||118) + (+u.kes||0));
  return round2(+u.iznos||0); // kompatibilnost sa starim zapisima
}
/* meta podaci i rok po nalogodavcu */
function nalogMeta(name){ return state.nalozi.find(n=>n.nalogodavac===name) || {}; }
function rokFor(name){ const r=+nalogMeta(name).rok||0; return r>0 ? r : (state.settings.rok||30); }
/* kategorija nalogodavca: KLIJENT / INTERNO / OSTALO + proizvoljne (normalizovano na velika slova) */
const KAT_DEFAULT = ['KLIJENT','INTERNO','OSTALO'];
const katNorm = k => String(k||'').trim().toUpperCase();
function katOf(name){ return katNorm(nalogMeta(name).kategorija) || 'KLIJENT'; }
function katList(){
  const seen=new Set(), out=[];
  [...KAT_DEFAULT, ...state.nalozi.map(n=>n.kategorija)].forEach(k=>{
    const u=katNorm(k); if(u && !seen.has(u)){ seen.add(u); out.push(u); }
  });
  return out;
}
function payNacin(u){
  const parts=[]; if(+u.eur>0)parts.push('EUR'); if(+u.din>0)parts.push('DIN'); if(+u.kes>0)parts.push('Gotovina');
  return u.nacin || parts.join('+') || 'Uplata';
}

/* ============================================================
   STORE  (localStorage keš + Apps Script JSON API)
   ============================================================ */
const Store = {
  loadLocal(){
    try{
      const raw = localStorage.getItem(CFG.LS_DATA);
      if(raw){ const d=JSON.parse(raw);
        state.zaduzenja=d.zaduzenja||[]; state.uplate=d.uplate||[];
        state.korisnici=d.korisnici||[]; state.nalozi=d.nalozi||[]; state.opomene=d.opomene||[];
        if(d.settings) Object.assign(state.settings,d.settings);
      }
    }catch(e){ console.warn('loadLocal',e); }
    if(!state.korisnici.length){
      state.korisnici=[{user:'admin',pass:'admin123',ime:'Administrator',uloga:'admin',aktivan:true}];
    }
  },
  saveLocal(){
    try{ localStorage.setItem(CFG.LS_DATA, JSON.stringify({
      zaduzenja:state.zaduzenja, uplate:state.uplate, korisnici:state.korisnici,
      nalozi:state.nalozi, opomene:state.opomene, settings:state.settings
    })); }catch(e){ console.warn('saveLocal',e); }
  },
  loadSession(){ try{ return JSON.parse(localStorage.getItem(CFG.LS_SESSION)||'null'); }catch(e){ return null; } },
  saveSession(s){ if(s) localStorage.setItem(CFG.LS_SESSION,JSON.stringify(s)); else localStorage.removeItem(CFG.LS_SESSION); },

  async api(fn,args){
    const body = JSON.stringify({fn, args: args||[]});
    const res = await fetch(CFG.WEB_APP_URL,{ method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, body });
    const txt = await res.text();
    let data; try{ data=JSON.parse(txt); }catch(e){ throw new Error('Neispravan odgovor servera'); }
    if(data && data.ok===false) throw new Error(data.error||'Greška na serveru');
    return data.result!==undefined ? data.result : data;
  },

  async pull(){
    if(!cloudOn() || !state.session) return false;
    setCloud('amber','Sinhronizacija…');
    try{
      const d = await this.api('getAllData',[state.session.token]);
      state.zaduzenja=d.zaduzenja||[]; state.uplate=d.uplate||[];
      state.korisnici=d.korisnici||state.korisnici;
      state.nalozi=d.nalozi||[]; state.opomene=d.opomene||[];
      if(d.settings) Object.assign(state.settings,d.settings);
      this.saveLocal(); setCloud('green','Sinhronizovano'); return true;
    }catch(e){ setCloud('red','Cloud nedostupan'); toast('Sinhronizacija nije uspela: '+e.message,'warn'); return false; }
  },

  /* optimistično lokalno + cloud u pozadini */
  async push(fn,args){
    this.saveLocal();
    if(!cloudOn() || !state.session) return;
    setCloud('amber','Čuvanje…');
    try{ await this.api(fn,[state.session.token,...(args||[])]); setCloud('green','Sinhronizovano'); }
    catch(e){ setCloud('red','Nije sačuvano u cloud'); toast('Cloud: '+e.message,'warn'); }
  }
};

function setCloud(kind,txt){
  const b=$('#cloudBadge'); if(!b) return;
  b.innerHTML='<span class="dot '+kind+'"></span><span>'+esc(txt)+'</span>';
}

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin(user,pass){
  if(cloudOn()){
    const r = await Store.api('login',[user,pass]);   // {token, ime, uloga} ili {ok:false}
    return { token:r.token, user:user, ime:r.ime||user, uloga:r.uloga||'pregled' };
  }
  const u = state.korisnici.find(k=>k.user.toLowerCase()===String(user).toLowerCase() && k.aktivan!==false);
  if(!u || u.pass!==pass) throw new Error('Pogrešno korisničko ime ili lozinka.');
  return { token:'local', user:u.user, ime:u.ime||u.user, uloga:u.uloga||'pregled' };
}
const ROLE_LABEL = {admin:'Administrator',operater:'Operater',pregled:'Pregled'};
const can = {
  edit(){ return ['admin','operater'].includes(state.session?.uloga); },
  admin(){ return state.session?.uloga==='admin'; },
  import(){ return ['admin','operater'].includes(state.session?.uloga); }
};

function startSession(s){
  state.session=s; Store.saveSession(s);
  $('#login').classList.remove('on'); $('#app').classList.add('on');
  $('#uName').textContent=s.ime; $('#uRole').textContent=ROLE_LABEL[s.uloga]||s.uloga;
  $('#uAvatar').textContent=(s.ime||'?').trim().charAt(0).toUpperCase();
  setCloud(cloudOn()?'green':'gray', cloudOn()?'Cloud režim':'Lokalni režim');
}
function logout(){
  state.session=null; Store.saveSession(null);
  $('#app').classList.remove('on'); $('#login').classList.add('on');

/* ============================================================
   PRORAČUN (saldo, status, dospelost, trend, kanali)
   ============================================================ */
const round2 = n => Math.round((+n||0)*100)/100;
function compute(){
  const kurs=state.settings.kurs||118;
  const t = today();

  // uplate po nalogodavcu (EUR-ekvivalent + po kanalima)
  const payBy={}, payCh={};
  for(const u of state.uplate){ const k=u.nalogodavac||'';
    payBy[k]=(payBy[k]||0)+payEur(u);
    const pc=payCh[k]||(payCh[k]={eur:0,din:0,kes:0});
    pc.eur+=(+u.eur||0); pc.din+=(+u.din||0); pc.kes+=(+u.kes||0);
  }

  // zaduženja po nalogodavcu (sortirana po datumu za FIFO)
  const chBy={};
  for(const c of state.zaduzenja){ (chBy[c.nalogodavac]=chBy[c.nalogodavac]||[]).push(c); }
  const cover={};            // chargeId -> pokriveno EUR
  const byDebtor={};
  for(const name in chBy){
    const rok=rokFor(name);
    const list=chBy[name].slice().sort((a,b)=> (a.datum||'').localeCompare(b.datum||'') || (+a.tura||0)-(+b.tura||0));
    let pool=payBy[name]||0; const paidTotal=pool;
    let charged=0, ch={eur:0,din:0,kes:0,dinRaw:0}, oldest=null, count=list.length;
    for(const c of list){
      const amt=+c.iznos||0; charged+=amt;
      ch.eur+=(+c.balkanAvto||0); ch.dinRaw+=(+c.inoDeo||0); ch.din+=(+c.inoDeo||0)/kurs; ch.kes+=(+c.kes||0);
      const cov=Math.min(amt,Math.max(0,pool)); cover[c.id]=cov; pool-=cov;
      if(!oldest || (c.datum||'')<oldest) oldest=c.datum||oldest;
    }
    const saldo=round2(charged-paidTotal);
    let status = saldo<=0.005?'paid' : (paidTotal>0?'part':'open');
    let overdue=false;
    if(saldo>0.005){ for(const c of list){ const unc=(+c.iznos||0)-(cover[c.id]||0);
      if(unc>0.005 && c.datum && daysBetween(c.datum,t)>rok){ overdue=true; break; } } }
    const lastPay = state.uplate.filter(u=>u.nalogodavac===name).map(u=>u.datum).sort().slice(-1)[0]||null;
    const pc=payCh[name]||{eur:0,din:0,kes:0};
    const saldoCh={ eur:round2(ch.eur-pc.eur), din:round2(ch.dinRaw-pc.din), kes:round2(ch.kes-pc.kes) };
    const meta=nalogMeta(name);
    byDebtor[name]={ name, charged:round2(charged), paid:round2(paidTotal), saldo, status, overdue,
                     count, ch, chPaid:{eur:round2(pc.eur),din:round2(pc.din),kes:round2(pc.kes)}, saldoCh,
                     rok, meta, kategorija:katOf(name), oldest, lastPay, klijenti:[...new Set(list.map(c=>c.klijent).filter(Boolean))] };
  }

  // totali
  const T={charged:0,paid:0,saldo:0,eur:0,din:0,dinRaw:0,kes:0,
           paidEur:0,paidDinRaw:0,paidKes:0,vehicles:0,
           debtors:0,openDebtors:0,overdueAmt:0,charges:state.zaduzenja.length};
  for(const c of state.zaduzenja){ T.charged+=(+c.iznos||0); T.vehicles+=(+c.kolicina||0);
    T.eur+=(+c.balkanAvto||0); T.dinRaw+=(+c.inoDeo||0); T.din+=(+c.inoDeo||0)/kurs; T.kes+=(+c.kes||0); }
  for(const u of state.uplate){ T.paidEur+=(+u.eur||0); T.paidDinRaw+=(+u.din||0); T.paidKes+=(+u.kes||0); }
  for(const n in byDebtor){ const d=byDebtor[n]; T.paid+=d.paid; T.debtors++;
    if(d.saldo>0.005){ T.openDebtors++; } if(d.overdue){ T.overdueAmt+=d.saldo; } }
  T.charged=round2(T.charged); T.paid=round2(T.paid); T.saldo=round2(T.charged-T.paid);
  T.eur=round2(T.eur); T.din=round2(T.din); T.kes=round2(T.kes);
  T.paidEur=round2(T.paidEur); T.paidKes=round2(T.paidKes); T.overdueAmt=round2(T.overdueAmt);
  T.saldoEur=round2(T.eur-T.paidEur); T.saldoDinRaw=round2(T.dinRaw-T.paidDinRaw); T.saldoKes=round2(T.kes-T.paidKes);

  // mesečni trend
  const m={};
  for(const c of state.zaduzenja){ const y=ymOf(c.datum); if(!y)continue; (m[y]=m[y]||{ch:0,pay:0}).ch+=(+c.iznos||0); }
  for(const u of state.uplate){ const y=ymOf(u.datum); if(!y)continue; (m[y]=m[y]||{ch:0,pay:0}).pay+=payEur(u); }
  const months=Object.keys(m).sort(); const trend=months.map(k=>({ym:k,label:ymLabel(k),ch:round2(m[k].ch),pay:round2(m[k].pay)}));

  // po turama (sortirano po broju)
  const tu={};
  for(const c of state.zaduzenja){ const k=c.tura||'—'; (tu[k]=tu[k]||{iznos:0,voz:0}).iznos+=(+c.iznos||0); tu[k].voz+=(+c.kolicina||0); }
  const ture=Object.keys(tu).sort((a,b)=>(+a||0)-(+b||0)).map(k=>({tura:k,iznos:round2(tu[k].iznos),voz:tu[k].voz}));

  // dospelost (aging) — nepokriveni ostaci, rok po nalogodavcu
  const aging={'Nije dospelo':0,'1–30':0,'31–60':0,'61–90':0,'90+':0};
  for(const c of state.zaduzenja){ const unc=(+c.iznos||0)-(cover[c.id]||0); if(unc<=0.005)continue;
    const over = c.datum? daysBetween(c.datum,t)-rokFor(c.nalogodavac) : 0;
    const b = over<=0?'Nije dospelo' : over<=30?'1–30' : over<=60?'31–60' : over<=90?'61–90' : '90+';
    aging[b]+=unc; }
  for(const k in aging) aging[k]=round2(aging[k]);

  // top klijenti (firma sa koje se uplaćuje) — po prometu
  const cl={};
  for(const c of state.zaduzenja){ const k=c.klijent||'—'; cl[k]=(cl[k]||0)+(+c.iznos||0); }
  const klijenti=Object.entries(cl).map(([k,v])=>({k,v:round2(v)})).sort((a,b)=>b.v-a.v);

  state.derived={byDebtor,cover,T,trend,ture,aging,klijenti};
  return state.derived;
}

/* dominantni period za sidebar */
function periodInfo(){
  const ms={}; for(const c of state.zaduzenja){ const y=ymOf(c.datum); if(y)ms[y]=(ms[y]||0)+1; }
  const keys=Object.keys(ms); if(!keys.length) return 'Nema podataka';
  if(keys.length===1) return ymLabel(keys[0]);
  keys.sort(); return ymLabel(keys[0])+' – '+ymLabel(keys[keys.length-1]);
}

/* ============================================================
   UVOZ (.xls / .xlsx)  — parser sa detekcijom zaglavlja
   ============================================================ */
const HEADER_MAP=[
  [['nalogodavac'],'nalogodavac'], [['tura'],'tura'],
  [['grad utovara','utovar'],'utovar'], [['grad istovara','istovar'],'istovar'],
  [['kolicina','količina'],'kolicina'], [['iznoseur','iznos eur','iznos'],'iznos'],
  [['ino deo 1','ino deo','inodeo','ino'],'inoDeo'], [['balkan avto','balkanavto','balkan'],'balkanAvto'],
  [['kes','keš','kesh'],'kes'], [['opste napomene','opšte napomene','napomene'],'napomene'],
  [['vozilo'],'vozilo'], [['vozac','vozač'],'vozac'], [['klijent'],'klijent']
];
const normH = s => String(s==null?'':s).toLowerCase().replace(/\s+/g,' ').trim();
function mapHeader(row){
  const map={}; row.forEach((cell,i)=>{ const h=normH(cell);
    for(const [keys,field] of HEADER_MAP){ if(keys.includes(h)){ if(map[field]===undefined) map[field]=i; break; } } });
  return (map.nalogodavac!==undefined && map.tura!==undefined) ? map : null;
}
function parseNum(v){ if(v==null||v==='')return 0; if(typeof v==='number')return v;
  let s=String(v).replace(/\s/g,''); if(s.indexOf(',')>-1 && s.indexOf('.')>-1) s=s.replace(/\./g,'').replace(',','.');
  else if(s.indexOf(',')>-1) s=s.replace(',','.'); const n=parseFloat(s); return isNaN(n)?0:n; }

async function parseImportFile(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
  let map=null; const out=[];
  for(const row of rows){
    if(!row || !row.length) continue;
    const maybe=mapHeader(row); if(maybe){ map=maybe; continue; }
    if(!map) continue;
    const g=f=> map[f]!==undefined ? row[map[f]] : '';
    const nalogodavac=String(g('nalogodavac')||'').trim();
    const tura=String(g('tura')||'').trim();
    if(!nalogodavac || !tura) continue;
    out.push({
      nalogodavac, tura,
      utovar:String(g('utovar')||'').trim(), istovar:String(g('istovar')||'').trim(),
      kolicina:parseNum(g('kolicina')), iznos:round2(parseNum(g('iznos'))),
      inoDeo:round2(parseNum(g('inoDeo'))), balkanAvto:round2(parseNum(g('balkanAvto'))),
      kes:round2(parseNum(g('kes'))), napomene:String(g('napomene')||'').trim(),
      vozilo:String(g('vozilo')||'').trim(), vozac:String(g('vozac')||'').trim(),
      klijent:String(g('klijent')||'').trim()
    });
  }
  return out;
}
function dedupAgainstExisting(parsed){
  const have=new Set(state.zaduzenja.map(chargeKey));
  const novo=[], dup=[];
  for(const c of parsed){ const k=chargeKey(c); if(have.has(k)){ dup.push(c); } else { have.add(k); novo.push(c); } }
  return {novo,dup};
}

/* ---- sortiranje kolona (generičko) ---- */
state.sort={ zaduzenja:{key:'tura',dir:1}, nalogodavci:{key:'saldo',dir:-1}, uplate:{key:'datum',dir:-1}, opomene:{key:'datum',dir:-1} };
function thSort(view,key,label,cls){
  const s=state.sort[view], on=s.key===key, arr=on?(s.dir>0?' ▲':' ▼'):'';
  return `<th class="${cls||''} sortable" data-sk="${esc(key)}" style="cursor:pointer;user-select:none;white-space:nowrap">${esc(label)}<span class="sortarr">${arr}</span></th>`;
}
function wireSort(view,fill){
  $$('thead.h-'+view+' th.sortable').forEach(th=>th.onclick=()=>{
    const s=state.sort[view], k=th.dataset.sk;
    if(s.key===k) s.dir=-s.dir; else { s.key=k; s.dir = (k==='datum'||k==='saldo'||k==='zaduzeno')? -1 : 1; }
    fill();
  });
}
function cmpVal(a,b){ if(a==null)a=''; if(b==null)b='';
  if(typeof a==='number'&&typeof b==='number') return a-b;
  return String(a).localeCompare(String(b),'sr'); }
function applySort(rows,view,acc){ const s=state.sort[view], f=acc[s.key]; if(!f) return rows;
  return rows.slice().sort((x,y)=>cmpVal(f(x),f(y))*s.dir || cmpVal(acc.__tie?acc.__tie(x):0, acc.__tie?acc.__tie(y):0)); }

function wireDashActions(){

function barOpts(unit,legend){

function filteredZ(){
  const f=state.flt.zaduzenja, D=state.derived, q=f.q.toLowerCase().trim();
  let rows=state.zaduzenja.filter(c=>{
    if(f.kanal && kanalOf(c)!==f.kanal) return false;
    if(f.status){ const cov=D.cover[c.id]||0, unc=(+c.iznos||0)-cov;
      const over = unc>0.005 && c.datum && daysBetween(c.datum,today())>rokFor(c.nalogodavac);
      const st = unc<=0.005?'paid':(cov>0?'part':'open');
      if(f.status==='over'){ if(!over) return false; } else if(st!==f.status) return false; }
    if(q){ const hay=[c.nalogodavac,c.tura,c.vozilo,c.vozac,c.klijent,c.utovar,c.istovar,c.napomene].join(' ').toLowerCase();
      if(!hay.includes(q)) return false; }
    return true;
  });
  const acc={ tura:c=>+c.tura||0, nalogodavac:c=>c.nalogodavac||'', vozilo:c=>c.vozilo||'',
    kom:c=>+c.kolicina||0, iznos:c=>+c.iznos||0, eur:c=>+c.balkanAvto||0, din:c=>+c.inoDeo||0, kes:c=>+c.kes||0,
    status:c=>statOf(c), __tie:c=>+c.tura||0 };
  return applySort(rows,'zaduzenja',acc);
}
function fillZ(){
  const D=state.derived, rows=filteredZ();
  let sIz=0,sKom=0,sEur=0,sDinR=0,sKes=0;
  for(const c of rows){ sIz+=(+c.iznos||0); sKom+=(+c.kolicina||0); sEur+=(+c.balkanAvto||0); sDinR+=(+c.inoDeo||0); sKes+=(+c.kes||0); }
  $('#zSum').innerHTML=[['Stavki',num(rows.length)],['Iznos',eur0(sIz)],['Vozila',num(sKom)],
    ['EUR faktura',eur0(sEur)],['DIN faktura',din(sDinR)],['Gotovina',eur0(sKes)]]
    .map(([l,vv])=>`<div class="ss"><div class="l">${l}</div><div class="v tnum">${vv}</div></div>`).join('');
  const cols=can.edit()?11:10;

  const cap=400, show=rows.slice(0,cap);
  body.innerHTML=show.map(c=>{
    const cov=D.cover[c.id]||0, unc=(+c.iznos||0)-cov;
    const over = unc>0.005 && c.datum && daysBetween(c.datum,today())>rokFor(c.nalogodavac);
    const st = unc<=0.005?'paid':(cov>0?'part':'open');
    return `<tr>
      <td class="strong">${esc(c.tura)}</td>
      <td><div class="strong" style="cursor:pointer" data-deb="${esc(c.nalogodavac)}">${esc(c.nalogodavac)}</div><div class="cellmeta">${esc(c.klijent||'')}</div></td>
      <td>${relacija(c)}</td>
      <td>${esc(c.vozilo||'—')}<div class="cellmeta">${esc(c.vozac||'')}</div></td>
      <td class="num">${num(c.kolicina)}</td>
      <td class="num strong">${eur(c.iznos)}</td>
      <td class="num">${+c.balkanAvto>0?eur(c.balkanAvto):'<span class="muted">—</span>'}</td>
      <td class="num">${+c.inoDeo>0?din(c.inoDeo):'<span class="muted">—</span>'}</td>
      <td class="num">${+c.kes>0?eur(c.kes):'<span class="muted">—</span>'}</td>
      <td>${statusChip(st,over)}</td>
      ${can.edit()?`<td><div class="row-actions">
        <button class="iconbtn" data-edit="${c.id}" title="Izmeni">${svg(I.edit)}</button>
        ${can.admin()?`<button class="iconbtn danger" data-del="${c.id}" title="Obriši">${svg(I.trash)}</button>`:''}</div></td>`:''}
    </tr>`;
  }).join('') + (rows.length>cap?`<tr><td colspan="${cols}" class="t-empty">Prikazano prvih ${cap} od ${rows.length}. Suzite filter.</td></tr>`:'');
  $$('#zBody [data-deb]').forEach(e=>e.onclick=()=>openDebtor(e.dataset.deb));
  $$('#zBody [data-edit]').forEach(e=>e.onclick=()=>chargeModal(e.dataset.edit));
  $$('#zBody [data-del]').forEach(e=>e.onclick=()=>confirmDelete('zaduženje',()=>{deleteCharge(e.dataset.del);toast('Zaduženje obrisano','ok');}));
}

function filteredN(){

function filteredU(){
  const q=state.flt.uplate.q.toLowerCase().trim();

    kes:u=>+u.kes||0, iznos:u=>payEur(u), by:u=>u.by||'', __tie:u=>u.ts||0 };

}
function fillU(){
  const rows=filteredU(); let s=0,se=0,sd=0,sk=0; rows.forEach(u=>{s+=payEur(u);se+=(+u.eur||0);sd+=(+u.din||0);sk+=(+u.kes||0);});

    <td>${esc(u.veza||'—')}</td><td class="cellmeta">${esc(u.napomena||'')}</td>
    <td class="cellmeta">${esc(u.by||'')}</td>
    ${can.edit()?`<td><button class="iconbtn danger" data-delu="${u.id}" title="Obriši">${svg(I.trash)}</button></td>`:''}</tr>`).join('');

function filteredO(){
  const f=state.flt.opomene, q=f.q.toLowerCase().trim();
  let rows=state.opomene.filter(o=>{
    if(q && ![o.nalogodavac,o.tekst,o.odgovor].join(' ').toLowerCase().includes(q)) return false;
    if(f.resp==='no' && (o.odgovor||'').trim()) return false;
    if(f.resp==='yes' && !(o.odgovor||'').trim()) return false;
    return true;
  });
  const acc={ datum:o=>o.datum||'', nalogodavac:o=>o.nalogodavac||'', by:o=>o.by||'', __tie:o=>o.ts||0 };
  return applySort(rows,'opomene',acc);
}
function fillO(){
  const rows=filteredO(); const noresp=rows.filter(o=>!(o.odgovor||'').trim()).length;
  $('#oSum').innerHTML=[['Opomena',num(rows.length)],['Bez odgovora',num(noresp)],['Sa odgovorom',num(rows.length-noresp)]]
    .map(([l,vv])=>`<div class="ss"><div class="l">${l}</div><div class="v tnum">${vv}</div></div>`).join('');
  const cols=can.edit()?6:5;
  const body=$('#oBody');
  if(!rows.length){ body.innerHTML=`<tr><td colspan="${cols}">${emptyState('Još nema opomena')}</td></tr>`; return; }

    <td class="strong">${fmtDate(o.datum)}</td>
    <td><span style="cursor:pointer" data-deb="${esc(o.nalogodavac)}">${esc(o.nalogodavac)}</span></td>

    <td class="cellmeta">${esc(o.by||'')}</td>
    ${can.edit()?`<td><div class="row-actions"><button class="iconbtn" data-eopo="${o.id}" title="Izmeni">${svg(I.edit)}</button><button class="iconbtn danger" data-dopo="${o.id}" title="Obriši">${svg(I.trash)}</button></div></td>`:''}</tr>`).join('');
  $$('#oBody [data-deb]').forEach(e=>e.onclick=()=>openDebtor(e.dataset.deb));
  $$('#oBody [data-eopo]').forEach(b=>b.onclick=()=>opomenaModal(null,b.dataset.eopo));
  $$('#oBody [data-dopo]').forEach(b=>b.onclick=()=>confirmDelete('opomenu',()=>{deleteOpomena(b.dataset.dopo);toast('Opomena obrisana','ok');}));
}

let _imp=null;
function renderUvoz(v){
  destroyCharts();
  if(!can.import()){ v.innerHTML=`<div class="panel"><div class="panel-b">${emptyState('Nemate dozvolu za uvoz.')}</div></div>`; return; }
  v.innerHTML=`
    <div class="note" style="margin-bottom:16px">${svg(I.alert)}<div>Očekivane kolone: <b>Nalogodavac, Tura, Grad utovara, Grad istovara, Količina, IznosEUR, Ino deo 1, Balkan avto, Keš, Opšte napomene, Vozilo, Vozač, Klijent</b>. Ponovljena zaglavlja i duplikati se automatski preskaču.</div></div>
    <div class="drop" id="drop">
      <input type="file" id="file" accept=".xls,.xlsx,.csv" style="display:none">
      <div class="di">${svg(I.uvoz)}</div>
      <h3>Prevucite .xls fajl ovde</h3><p>ili kliknite za izbor fajla (.xls, .xlsx, .csv)</p>
    </div>
    <div id="impPreview"></div>`;
  const drop=$('#drop'), file=$('#file');
  drop.onclick=()=>file.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('drag');};
  drop.ondragleave=()=>drop.classList.remove('drag');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('drag'); if(e.dataTransfer.files[0]) handleImport(e.dataTransfer.files[0]);};
  file.onchange=e=>{ if(e.target.files[0]) handleImport(e.target.files[0]); };
}
async function handleImport(file){
  if(typeof XLSX==='undefined'){ toast('Biblioteka se još učitava, pokušajte ponovo','warn'); return; }
  const prev=$('#impPreview'); prev.innerHTML=`<div class="panel"><div class="panel-b">${svg(I.refresh)} Učitavanje „${esc(file.name)}“…</div></div>`;
  try{
    const parsed=await parseImportFile(file);
    if(!parsed.length){ prev.innerHTML=`<div class="panel"><div class="panel-b">${emptyState('Nije pronađen nijedan red. Proverite zaglavlja kolona.')}</div></div>`; return; }
    const {novo,dup}=dedupAgainstExisting(parsed);
    _imp={parsed,novo,dup,name:file.name};
    let iz=0,kom=0; novo.forEach(c=>{iz+=c.iznos;kom+=c.kolicina;});
    const sample=novo.slice(0,40);
    prev.innerHTML=`
      <div class="summary-strip" style="margin-top:16px">
        <div class="ss"><div class="l">U fajlu</div><div class="v tnum">${num(parsed.length)}</div></div>
        <div class="ss"><div class="l">Novih</div><div class="v tnum" style="color:var(--ok)">${num(novo.length)}</div></div>
        <div class="ss"><div class="l">Duplikata</div><div class="v tnum" style="color:var(--muted)">${num(dup.length)}</div></div>
        <div class="ss"><div class="l">Iznos (novo)</div><div class="v tnum">${eur0(iz)}</div></div>
        <div class="ss"><div class="l">Vozila</div><div class="v tnum">${num(kom)}</div></div>
      </div>
      <div class="filters" style="align-items:flex-end">
        <div class="fg"><label>Datum zaduženja (za sve nove stavke)</label><input class="inp" type="date" id="impDate" value="${today()}"></div>
        <div style="flex:1"></div>
        <button class="btn btn-pri" id="impGo" ${novo.length?'':'disabled'}>${svg(I.check)} Uvezi ${num(novo.length)} ${novo.length===1?'stavku':'stavki'}</button>
      </div>
      <div class="panel"><div class="panel-h"><h3>Pregled novih stavki</h3><span class="hint">${sample.length} od ${novo.length}</span></div>
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Tura</th><th>Nalogodavac</th><th>Relacija</th><th class="num">Kom</th><th class="num">Iznos</th><th>Kanal</th><th>Vozilo</th></tr></thead><tbody>
        ${sample.map(c=>`<tr><td class="strong">${esc(c.tura)}</td><td>${esc(c.nalogodavac)}<div class="cellmeta">${esc(c.klijent||'')}</div></td><td>${relacija(c)}</td><td class="num">${num(c.kolicina)}</td><td class="num strong">${eur(c.iznos)}</td><td>${kanalTag(kanalOf(c))}</td><td class="cellmeta">${esc(c.vozilo||'')}</td></tr>`).join('')}
      </tbody></table></div></div>`;
    if($('#impGo')) $('#impGo').onclick=()=>{
      const dt=$('#impDate').value||today();
      commitImport(_imp.novo,dt);
      toast(`Uvezeno ${_imp.novo.length} stavki (${_imp.dup.length} duplikata preskočeno)`,'ok');
      _imp=null; go('zaduzenja');
    };
  }catch(ex){ console.error(ex); prev.innerHTML=`<div class="panel"><div class="panel-b">${emptyState('Greška pri čitanju: '+ex.message)}</div></div>`; }
}

function openModal(html,wide){ const m=$('#modal'); m.className='modal'+(wide?' wide':''); m.innerHTML=html;
  $('#modal-wrap').classList.add('on'); $('#modal-wrap').onclick=e=>{ if(e.target.id==='modal-wrap') closeModal(); }; }
function closeModal(){ $('#modal-wrap').classList.remove('on'); $('#modal').innerHTML=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if($('#modal-wrap')?.classList.contains('on')) closeModal(); else if($('#drawer')?.classList.contains('on')) closeDrawer(); }});
function dlist(id,vals){ return `<datalist id="${id}">`+[...new Set(vals.filter(Boolean))].sort().slice(0,800).map(x=>`<option value="${esc(x)}">`).join('')+`</datalist>`; }

}

     <div class="fg"><label>Ime i prezime</label><input class="inp" id="us_ime" value="${esc(k?.ime||'')}"></div>
     <div class="fg"><label>${k?'Nova lozinka (prazno = bez izmene)':'Lozinka *'}</label><input class="inp" type="password" id="us_pass" placeholder="${k?'••••••••':''}"></div>
     <div class="fg"><label>Uloga</label><select class="inp" id="us_role">
       <option value="admin" ${k?.uloga==='admin'?'selected':''}>Administrator</option>
       <option value="operater" ${(!k||k?.uloga==='operater')?'selected':''}>Operater</option>
       <option value="pregled" ${k?.uloga==='pregled'?'selected':''}>Pregled</option></select></div>
     <div class="fg"><label>Status</label><select class="inp" id="us_act"><option value="1" ${k?.aktivan!==false?'selected':''}>Aktivan</option><option value="0" ${k?.aktivan===false?'selected':''}>Neaktivan</option></select></div>
   </div><div class="hh" style="margin-top:8px">Uloge: <b>Administrator</b> sve, <b>Operater</b> unos/izmena, <b>Pregled</b> samo čitanje.</div></div>
   <div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Otkaži</button><button class="btn btn-pri" id="us_save">${svg(I.check)}Sačuvaj</button></div>`);
  $('#us_save').onclick=()=>{
    const user=(k?k.user:$('#us_user').value.trim()), pass=$('#us_pass').value;
    if(!user){ toast('Korisničko ime je obavezno','warn'); return; }
    if(!k && !pass){ toast('Lozinka je obavezna za novog korisnika','warn'); return; }
    saveUser({ user, ime:$('#us_ime').value.trim(), uloga:$('#us_role').value,
      aktivan:$('#us_act').value==='1', pass: pass||(k?k.pass:'') }, k?k.user:null);
    toast('Korisnik sačuvan','ok'); closeModal();
  };
}

/* ============================================================
   IZVOZ — Excel / JSON / PDF
   ============================================================ */
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500); }
function sheetSave(rows,sheet,file){ if(typeof XLSX==='undefined'){toast('Excel biblioteka se učitava','warn');return;}
  const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,sheet); XLSX.writeFile(wb,file); toast('Excel izvezen','ok'); }
function statOf(c){ const cov=state.derived.cover[c.id]||0, unc=(+c.iznos||0)-cov;
  const over=unc>0.005&&c.datum&&daysBetween(c.datum,today())>state.settings.rok;
  return over?'Dospelo':unc<=0.005?'Plaćeno':cov>0?'Delimično':'Otvoreno'; }
function exportZaduzenjaXlsx(rows){ compute();
  sheetSave(rows.map(c=>({Tura:c.tura,Nalogodavac:c.nalogodavac,Klijent:c.klijent||'',
    'Grad utovara':c.utovar||'','Grad istovara':c.istovar||'',Kolicina:c.kolicina||0,
    'Iznos EUR':c.iznos||0,'EUR faktura':c.balkanAvto||0,'DIN faktura':c.inoDeo||0,'Gotovina EUR':c.kes||0,
    Vozilo:c.vozilo||'',Vozac:c.vozac||'',Datum:c.datum||'',Kanal:kanalOf(c),Status:statOf(c)})),
    'Zaduzenja',`zaduzenja_${today()}.xlsx`); }
function exportNalogodavciXlsx(rows){ sheetSave(rows.map(d=>({Nalogodavac:d.name,Kategorija:d.kategorija,Stavki:d.count,
    'Zaduzeno EUR':d.charged,'Naplaceno EUR':d.paid,'Saldo EUR-eq':d.saldo,
    'Saldo EUR faktura':d.saldoCh.eur,'Saldo DIN faktura':d.saldoCh.din,'Saldo gotovina':d.saldoCh.kes,
    'Rok (dana)':d.rok, Status:d.overdue?'Dospelo':({open:'Otvoreno',part:'Delimicno',paid:'Placeno'}[d.status]),
    'Kontakt osoba':d.meta.kontaktOsoba||'',Telefon:d.meta.telefon||'',Email:d.meta.email||'',Napomena:d.meta.napomena||'',
    Klijenti:d.klijenti.join(', ')})),'Nalogodavci',`nalogodavci_${today()}.xlsx`); }
function exportUplateXlsx(rows){ sheetSave(rows.map(u=>({Datum:u.datum,Nalogodavac:u.nalogodavac,
    'EUR faktura':+u.eur||0,'DIN faktura':+u.din||0,'Gotovina EUR':+u.kes||0,'Ukupno EUR-eq':payEur(u),
    Nacin:payNacin(u),Veza:u.veza||'',Napomena:u.napomena||'',Uneo:u.by||''})),
    'Uplate',`uplate_${today()}.xlsx`); }
function exportOpomeneXlsx(rows){ sheetSave(rows.map(o=>({Datum:o.datum,Nalogodavac:o.nalogodavac,
    Tekst:o.tekst||'',Odgovor:o.odgovor||'',Uneo:o.by||''})),'Opomene',`opomene_${today()}.xlsx`); }
function exportReportXlsx(){ if(typeof XLSX==='undefined'){toast('Excel biblioteka se učitava','warn');return;}
  compute(); const D=state.derived,T=D.T; const wb=XLSX.utils.book_new();
  const sum=[['BALKAN AVTO — Izvestaj naplate'],['Datum',fmtDate(today())],[],
    ['Ukupno zaduzeno EUR',T.charged],['Naplaceno EUR',T.paid],['Saldo EUR',T.saldo],
    ['Stopa naplate %',T.charged>0?Math.round(T.paid/T.charged*100):0],['Dospelo EUR',T.overdueAmt],
    ['Broj stavki',T.charges],['Broj vozila',T.vehicles],['Broj nalogodavaca',T.debtors],[],
    ['Kanal EUR (Balkan avto)',T.eur],['Kanal DIN (Ino deo)',T.dinRaw],['Kanal Kes EUR',T.kes]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'Sazetak');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Period','Iznos EUR'],...Object.entries(D.aging)]),'Dospelost');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(D.klijenti.map(x=>({Klijent:x.k,'Promet EUR':x.v}))),'Po klijentu');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.values(D.byDebtor).sort((a,b)=>b.saldo-a.saldo).map(d=>({Nalogodavac:d.name,Kategorija:d.kategorija,'Zaduzeno':d.charged,'Naplaceno':d.paid,'Saldo':d.saldo}))),'Nalogodavci');
  const katAgg={}; Object.values(D.byDebtor).forEach(d=>{ const g=katAgg[d.kategorija]||(katAgg[d.kategorija]={Kategorija:d.kategorija,Nalogodavaca:0,Zaduzeno:0,Naplaceno:0,Saldo:0}); g.Nalogodavaca++; g.Zaduzeno=round2(g.Zaduzeno+d.charged); g.Naplaceno=round2(g.Naplaceno+d.paid); g.Saldo=round2(g.Saldo+d.saldo); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.values(katAgg).sort((a,b)=>b.Saldo-a.Saldo)),'Po kategoriji');
  XLSX.writeFile(wb,`izvestaj_naplata_${today()}.xlsx`); toast('Excel izveštaj izvezen','ok');
}
function downloadBackup(){ const data={zaduzenja:state.zaduzenja,uplate:state.uplate,
    korisnici:state.korisnici.map(k=>({user:k.user,ime:k.ime,uloga:k.uloga,aktivan:k.aktivan})),
    settings:state.settings,exported:new Date().toISOString()};
  dl(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),`balkan_naplata_backup_${today()}.json`); toast('Rezervna kopija preuzeta','ok'); }

/* ---- PDF izvoz tabela (prati trenutni filter i sortiranje) ---- */
function tablePDF(title,sub,head,body,opts){
  opts=opts||{};
  if(!pdfReady()){ toast('PDF biblioteka se učitava, pokušajte ponovo','warn'); return; }
  if(!body.length){ toast('Nema podataka za izvoz','warn'); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4',orientation:opts.landscape?'landscape':'portrait'});
  pdfHeader(doc,title,sub);
  doc.autoTable({ startY:72, head:[head], body,
    styles:{font:'helvetica',fontSize:8,cellPadding:4,overflow:'linebreak'},
    headStyles:{fillColor:[22,24,29],textColor:255,fontSize:8},
    alternateRowStyles:{fillColor:[247,248,250]},
    columnStyles:opts.colStyles||{}, margin:{left:28,right:28} });
  const H=doc.internal.pageSize.getHeight();
  doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text('Balkan Avto (SLO) / Balkan Transport (SRB) — sistem za naplatu · '+fmtDate(today()),28,H-16);
  doc.save(opts.file||('izvoz_'+today()+'.pdf')); toast('PDF kreiran','ok');
}

/* ---- PDF (jsPDF + autotable). Dijakritika se preslovljava radi kompatibilnosti fonta. ---- */
function asciiSr(s){ return String(s==null?'':s)
  .replace(/đ/g,'dj').replace(/Đ/g,'Dj').replace(/č/g,'c').replace(/ć/g,'c').replace(/š/g,'s').replace(/ž/g,'z')
  .replace(/Č/g,'C').replace(/Ć/g,'C').replace(/Š/g,'S').replace(/Ž/g,'Z'); }
const eurP = n => nf2.format(+n||0)+' EUR';
const dinP = n => nf0.format(Math.round(+n||0))+' din';
function pdfReady(){ return !(typeof window.jspdf==='undefined'); }
function pdfHeader(doc,title,sub){ const W=doc.internal.pageSize.getWidth();
  doc.setFillColor(200,30,43); doc.rect(0,0,W,58,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.text('BALKAN AVTO',40,26);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.text(asciiSr(title),40,44);
  if(sub){ doc.setFontSize(9); doc.text(asciiSr(sub),W-40,44,{align:'right'}); }
  doc.setTextColor(20,20,20); }
function generateIzvodPDF(name){
  if(!pdfReady()){ toast('PDF biblioteka se učitava, pokušajte ponovo','warn'); return; }
  compute(); const D=state.derived, d=D.byDebtor[name]||{charged:0,paid:0,saldo:0};
  const charges=state.zaduzenja.filter(c=>c.nalogodavac===name).sort((a,b)=>(a.datum||'').localeCompare(b.datum||'')||(+a.tura||0)-(+b.tura||0));
  const pays=state.uplate.filter(u=>u.nalogodavac===name).sort((a,b)=>(a.datum||'').localeCompare(b.datum||''));
  const { jsPDF }=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'}); const W=doc.internal.pageSize.getWidth();
  pdfHeader(doc,'IZVOD OTVORENIH STAVKI','Datum: '+fmtDate(today()));
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text(asciiSr(name),40,86);
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(90,90,90);
  doc.text('Zaduzeno: '+eurP(d.charged)+'    Naplaceno: '+eurP(d.paid),40,104);
  doc.setTextColor(200,30,43); doc.setFont('helvetica','bold'); doc.text('SALDO: '+eurP(d.saldo),40,120); doc.setTextColor(20,20,20);
  doc.autoTable({ startY:134, head:[['Tura','Relacija','Datum','Iznos EUR','Status']],
    body:charges.map(c=>[asciiSr(c.tura),asciiSr((c.utovar||'-')+' > '+(c.istovar||'-')),fmtDate(c.datum),eurP(c.iznos),asciiSr(statOf(c))]),
    styles:{font:'helvetica',fontSize:9,cellPadding:5}, headStyles:{fillColor:[22,24,29],textColor:255,fontSize:9},
    alternateRowStyles:{fillColor:[247,248,250]}, columnStyles:{3:{halign:'right'}} });
  let y=doc.lastAutoTable.finalY+18;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text('Uplate',40,y); y+=8;
  doc.autoTable({ startY:y, head:[['Datum','Nacin','Veza','Iznos EUR']],
    body:pays.length?pays.map(u=>[fmtDate(u.datum),asciiSr(u.nacin||''),asciiSr(u.veza||''),eurP(u.iznos)]):[['—','—','—','—']],
    styles:{font:'helvetica',fontSize:9,cellPadding:5}, headStyles:{fillColor:[12,138,106],textColor:255,fontSize:9},
    alternateRowStyles:{fillColor:[247,248,250]}, columnStyles:{3:{halign:'right'}} });
  const H=doc.internal.pageSize.getHeight(); doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text('Balkan Avto (SLO) / Balkan Transport (SRB) — generisano iz sistema za naplatu',40,H-24);
  doc.save('Izvod_'+asciiSr(name).replace(/[^a-zA-Z0-9]+/g,'_')+'_'+today()+'.pdf'); toast('PDF izvod kreiran','ok');
}
